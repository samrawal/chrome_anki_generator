<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MKSAP Anki Cloze</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup-shell">
      <header class="popup-header">
        <div>
          <h1>MKSAP Cloze</h1>
          <p id="statusText" class="status-text">Ready</p>
        </div>
      </header>

      <section id="message" class="message" hidden></section>

      <section class="actions">
        <button id="generateButton" type="button">Generate cloze</button>
        <button id="copyButton" type="button" disabled>Copy</button>
      </section>

      <textarea
        id="cardOutput"
        class="card-output"
        spellcheck="false"
        placeholder="Generated cloze card will appear here."
      ></textarea>
    </main>

    <script type="module" src="src/popup.js"></script>
  </body>
</html>
