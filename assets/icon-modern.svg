<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="title desc">
  <title>Modern MKSAP Anki Cloze icon candidate</title>
  <desc>A modern abstract flashcard stack with a cloze highlight chip.</desc>
  <defs>
    <linearGradient id="bg" x1="17" y1="13" x2="112" y2="115" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#29d3dc"/>
      <stop offset="0.52" stop-color="#10a88d"/>
      <stop offset="1" stop-color="#246f60"/>
    </linearGradient>
    <linearGradient id="card" x1="31" y1="28" x2="96" y2="101" gradientUnits="userSpaceOnUse">
